<html lang="mn">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШУА-ийн гадаад хамтын ажиллагаа</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#ffffff; --bg-sec:#f5f5f3; --bg-info:#E6F1FB;
  --text:#1a1a18; --text-sec:#6b6b67; --text-info:#0C447C;
  --border:rgba(0,0,0,0.12); --border-sec:rgba(0,0,0,0.22);
  --r-md:8px; --r-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg-sec:#252523;--bg-info:#042C53;--text:#f0f0ec;--text-sec:#9a9a94;--text-info:#85B7EB;--border:rgba(255,255,255,0.12);--border-sec:rgba(255,255,255,0.22);}
  .reg-EU{background:#26215C!important;color:#AFA9EC!important}
  .reg-AS{background:#04342C!important;color:#5DCAA5!important}
  .reg-AM{background:#4A1B0C!important;color:#F0997B!important}
  .reg-OT{background:#2C2C2A!important;color:#B4B2A9!important}
  tbody tr.sel{background:#042C53!important}
  #map-svg{background:#252523}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem;max-width:1100px;margin:0 auto;}
#map-svg{display:block;width:100%;height:auto;border-radius:var(--r-lg);background:#eeeee8;margin-bottom:.5rem;border:0.5px solid var(--border);}
.land{fill:#c8c8c4;stroke:#fff;stroke-width:.3;transition:fill .2s;}
.land.has-data{fill:#9FE1CB;cursor:pointer;}
.land.has-data:hover{fill:#5DCAA5;}
.land.map-on{fill:#378ADD!important;stroke:#185FA5;}
.land.map-highlight{fill:yellow;stroke:#A9CFF6;}
.legend{display:flex;gap:16px;font-size:12px;color:var(--text-sec);margin-bottom:.75rem;align-items:center;flex-wrap:wrap;}
.leg-dot{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}
.map-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem;min-height:26px;}
.map-pill{font-size:12px;padding:3px 10px 3px 12px;border-radius:20px;background:#E6F1FB;color:#0C447C;cursor:pointer;border:1px solid #B5D4F4;display:flex;align-items:center;gap:6px;font-family:var(--font);}
.map-pill .x{opacity:.55;font-size:11px;}
.map-pill:hover .x{opacity:1;}
.map-hint{font-size:12px;color:var(--text-sec);}
.topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;}
h1{font-size:20px;font-weight:500;color:var(--text);}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;background:var(--bg-info);color:var(--text-info);}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg-sec);border-radius:var(--r-md);padding:14px 16px;}
.stat-n{font-size:26px;font-weight:500;color:var(--text);line-height:1;}
.stat-l{font-size:12px;color:var(--text-sec);margin-top:4px;}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
input[type="text"],select{font-family:var(--font);font-size:13px;background:var(--bg);color:var(--text);border:0.5px solid var(--border-sec);border-radius:var(--r-md);padding:8px 12px;outline:none;transition:border-color .15s;}
input[type="text"]{flex:1;min-width:200px;}
select{min-width:140px;cursor:pointer;}
input[type="text"]:focus,select:focus{border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,.15);}
.tbl-wrap{border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px;min-width:600px;}
thead th{background:var(--bg-sec);padding:10px 14px;text-align:left;font-weight:500;color:var(--text-sec);font-size:12px;border-bottom:0.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
th.sort{cursor:pointer;user-select:none;}
th.sort:hover{color:var(--text);}
.sort-ind{margin-left:4px;opacity:.5;}
tbody tr{border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg-sec);}
tbody tr.sel{background:#E6F1FB;}
td{padding:10px 14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.num{color:var(--text-sec);font-size:12px;}
.reg-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block;white-space:nowrap;}
.reg-EU{background:#EEEDFE;color:#3C3489;}
.reg-AS{background:#E1F5EE;color:#085041;}
.reg-AM{background:#FAECE7;color:#712B13;}
.reg-OT{background:#F1EFE8;color:#444441;}
.empty{text-align:center;padding:2.5rem;color:var(--text-sec);font-size:13px;}
.detail{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.5rem;margin-top:1rem;display:none;}
.detail.show{display:block;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.detail-title{font-size:15px;font-weight:500;color:var(--text);}
.detail-sub{font-size:12px;color:var(--text-sec);margin-top:3px;}
.close-btn{font-size:12px;color:var(--text-sec);cursor:pointer;border:0.5px solid var(--border-sec);border-radius:6px;padding:4px 10px;background:transparent;font-family:var(--font);transition:background .12s;flex-shrink:0;}
.close-btn:hover{background:var(--bg-sec);}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;border-top:0.5px solid var(--border);padding-top:12px;}
.detail-row{display:flex;flex-direction:column;gap:3px;}
.detail-label{font-size:11px;color:var(--text-sec);}
.detail-val{font-size:14px;color:var(--text);font-weight:500;white-space:normal;line-height:1.4;}
footer{margin-top:2rem;font-size:12px;color:var(--text-sec);text-align:center;}
</style>
</head>

</div>

<div class="tbl-wrap">

      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

<footer>Монгол Улсын Шинжлэх Ухааны Академи &mdash; Олон улсын гэрээний бүртгэл</footer>

const partnerIds = new Set(RAW.map(d => d.svgId.toUpperCase()));

function regCode(r){
  if (!r && r !== '') return '';
  const s = String(r).trim();
  if (!s) return '';
  const up = s.toUpperCase();
  if (up === 'EU' || up === 'ЕВРОП' || s === 'Европ') return 'EU';
  if (up === 'AS' || up === 'АЗИ' || s === 'Ази') return 'AS';
  if (up === 'AM' || up === 'АМЕРИК' || s === 'Америк') return 'AM';
  if (up === 'OT' || up === 'АФРИК' || s === 'Африк' || s === 'Бусад') return 'OT';
  // already a short code?
  if (['EU','AS','AM','OT'].includes(up)) return up;
  return s;
}

function regLabel(r){ return {EU:'Европ',AS:'Ази',AM:'Америк',OT:'Африк'}[r]||r; }

function countryNameForUid(uid){
  if(!uid) return '';
  const found = RAW.find(d=> (d.svgId||'').toUpperCase() === uid.toUpperCase());
  return found ? found.country : '';
}

function regLabelForUid(uid){
  if(!uid) return '';
  const found = RAW.find(d=> (d.svgId||'').toUpperCase() === uid.toUpperCase());
  return found ? regLabel(regCode(found.reg)) : '';
}

function showMapHint(text){
  // create or reuse a floating tooltip positioned next to the mouse cursor
  let tip = document.getElementById('map-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'map-tooltip';
    tip.style.position = 'fixed';
    tip.style.pointerEvents = 'none';
    tip.style.zIndex = 9999;
    tip.style.background = 'rgba(0,0,0,0.8)';
    tip.style.color = '#fff';
    tip.style.padding = '6px 8px';
    tip.style.borderRadius = '6px';
    tip.style.fontSize = '12px';
    tip.style.fontFamily = 'var(--font)';
    tip.style.display = 'none';
    document.body.appendChild(tip);
  }
  tip.textContent = text || '';
  tip.style.display = text ? '' : 'none';
}

function restoreMapHint(){
  // hide floating tooltip and re-render pills in the map-filters area
  const tip = document.getElementById('map-tooltip');
  if (tip) tip.style.display = 'none';
  updatePills();
}

// ── MAP ───────────────────────────────────────────────────────────────────────
async function loadMap(){
  try {
    const resp = await fetch('worldHigh.svg');
    if(!resp.ok) throw new Error('not found');
    const doc = new DOMParser().parseFromString(await resp.text(),'image/svg+xml');
    const remote = doc.querySelector('svg');
    if(!remote) return;
    const host = document.getElementById('map-svg');
    const vb = remote.getAttribute('viewBox');
    if(vb) host.setAttribute('viewBox', vb);
    remote.childNodes.forEach(n => host.appendChild(document.importNode(n,true)));

    // Add land class and click handlers (attach to all ids so clicks always work)
    host.querySelectorAll('[id]').forEach(el => {
      el.classList.add('land');
      const uid = (el.id||'').toUpperCase();

      // show region (legend) label for this country in the map hint when hovering
      el.addEventListener('mouseenter', (ev) => {
        ev.stopPropagation();
        // show country name in floating tooltip
        showMapHint(countryNameForUid(uid));
        const tip = document.getElementById('map-tooltip');
        if(tip){ tip.style.left = (ev.clientX + 12) + 'px'; tip.style.top = (ev.clientY + 12) + 'px'; }
      });
      el.addEventListener('mouseleave', (ev) => {
        ev.stopPropagation();
        // hide tooltip and restore pills/hint state
        restoreMapHint();
      });

      if(partnerIds.has(uid)){
        el.classList.add('has-data');
        // attach click handler only for countries that have data
        el.addEventListener('click', (ev) => { ev.stopPropagation(); console.debug('map click', uid); toggleMapCountry(uid); });
      } else {
        // Do not disable pointer events on parent/group elements that contain
        // child elements which themselves are partner shapes. Disabling pointer
        // events on a container would make its children non-interactive.
        const hasPartnerDescendant = Array.from(el.querySelectorAll('[id]')).some(ch => partnerIds.has((ch.id||'').toUpperCase()));
        if (!hasPartnerDescendant) {
          const prev = el.getAttribute('style') || '';
          el.setAttribute('style', prev + ';cursor:default;pointer-events:none;');
        }
      }
    });
    syncMapSelection();

    // Add a robust hover fallback: on mousemove find the element under cursor
    // and show its country name in the hint. This helps when SVG groups/parents
    // intercept pointer events or IDs are nested.
    host.addEventListener('mousemove', (ev) => {
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      if(!el) return;
      let node = el;
      // climb until we find an element with an id or reach the host svg
      while(node && node !== host && !node.id) node = node.parentNode;
      if(node && node.id){
        // show country name for hovered element
        showMapHint(countryNameForUid(node.id));
        const tip = document.getElementById('map-tooltip');
        if(tip){ tip.style.left = (ev.clientX + 12) + 'px'; tip.style.top = (ev.clientY + 12) + 'px'; }
      }
    });
    host.addEventListener('mouseleave', () => restoreMapHint());
  } catch(e){ console.warn('Map SVG load failed:',e); }
}

function getMapEl(uid){
  // find element whose id matches uid case-insensitively
  return document.querySelector(`[id="${uid}"]`)
      || document.querySelector(`[id="${uid.toLowerCase()}"]`)
      || Array.from(document.querySelectorAll('[id]')).find(e=>e.id.toUpperCase()===uid);
}

function toggleMapCountry(uid){
  const el = getMapEl(uid);
  if(!el) return;
  mapOverride = true;
  if(activeMapIds.has(uid)){
    activeMapIds.delete(uid);
    el.classList.remove('map-on');
  } else {
    activeMapIds.add(uid);
    el.classList.add('map-on');
  }
  updatePills();
  render();
}

function syncMapSelection(){
  // Keep blue only for explicit selections
  document.querySelectorAll('#map-svg .land.map-on').forEach(el => {
    const uid = (el.id || '').toUpperCase();
    if (!activeMapIds.has(uid)) el.classList.remove('map-on');
  });
  activeMapIds.forEach(uid => {
    const el = getMapEl(uid);
    if (el) el.classList.add('map-on');
  });
}

function updateMapHighlights(data){
  // Light-highlight filtered countries without affecting explicit selections
  document.querySelectorAll('#map-svg .land.map-highlight').forEach(el => el.classList.remove('map-highlight'));
  const ids = new Set(data.map(d => (d.svgId || '').toUpperCase()));
  ids.forEach(uid => {
    if (!uid) return;
    const el = getMapEl(uid);
    if (!el || activeMapIds.has(uid)) return;
    el.classList.add('map-highlight');
  });
  
}

function updatePills(){
  const container = document.getElementById('map-filters');
  let hint = document.getElementById('map-hint');
  // If the hint element was removed or is missing, recreate a safe fallback
  if(!hint){
    hint = document.createElement('span');
    hint.id = 'map-hint';
    hint.className = 'map-hint';
    hint.textContent = 'Газрын зурган дээр улс дарж шүүх';
  }
  container.innerHTML = '';
  if(!activeMapIds.size){
    container.appendChild(hint);
    hint.style.display = '';
    return;
  }
  hint.style.display = 'none';
  activeMapIds.forEach(uid => {
    const names = [...new Set(RAW.filter(d=>d.svgId.toUpperCase()===uid).map(d=>d.country))].join(' / ');
    const pill = document.createElement('span');
    pill.className = 'map-pill';
    pill.innerHTML = names + ' <span class="x">✕</span>';
    pill.addEventListener('click', () => toggleMapCountry(uid));
    container.appendChild(pill);
  });
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Rebuild the type-filter options based on the provided data set
function updateTypeFilter(data){
  const sel = document.getElementById('type-filter');
  if(!sel) return;
  const current = sel.value;
  const types = Array.from(new Set(data.map(d=>d.type).filter(Boolean)));
  // sort types for stability
  types.sort((a,b)=>a.localeCompare(b));
  let html = '<option value="">Бүх төрөл</option>' + types.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  sel.innerHTML = html;
  // restore previous selection if still present
  if(types.includes(current)) sel.value = current; else sel.value = '';
}

// ── TABLE RENDER ──────────────────────────────────────────────────────────────
function render(){
  const q  = document.getElementById('search').value.toLowerCase();
  // normalize region select value to canonical code (EU/AS/AM/OT)
  const rg = regCode(document.getElementById('reg-filter').value);
  const tp = document.getElementById('type-filter').value;

  let data;
  if (activeMapIds.size && mapOverride) {
    // When the user explicitly selected countries on the map, filter the RAW
    // rows to those countries but still apply search/region/type filters so
    // the table respects the `type-filter`.
    data = RAW.filter(d => {
      if(!activeMapIds.has((d.svgId||'').toUpperCase())) return false;
      if(q && !d.org.toLowerCase().includes(q) && !d.country.toLowerCase().includes(q)) return false;
      if(rg && regCode(d.reg) !== rg) return false;
      if(tp && !d.type.includes(tp)) return false;
      return true;
    });
  } else {
    // Normal filtering path: apply search, region and type filters together.
    data = RAW.filter(d => {
      if(q && !d.org.toLowerCase().includes(q) && !d.country.toLowerCase().includes(q)) return false;
      if(rg && regCode(d.reg) !== rg) return false;
      if(tp && !d.type.includes(tp)) return false;
      return true;
    });
  }

  if(sortKey==='date') data.sort((a,b)=>sortDir*(a.date>b.date?1:-1));
  
  // If the user hasn't explicitly clicked the map (no override), make the
  // map reflect the current filtered dataset (so type/reg filters update countries).
  if(!mapOverride){
    const ids = new Set(data.map(d => (d.svgId||'').toUpperCase()).filter(Boolean));
    activeMapIds = ids;
    updatePills();
  }

  syncMapSelection();
  updateMapHighlights(data);
  // refresh available types for the current visible dataset
  updateTypeFilter(data);

  const tb = document.getElementById('tbody');
  if(!data.length){
    tb.innerHTML='<tr><td colspan="6" class="empty">Илэрц олдсонгүй</td></tr>';
    updateStats([]);
    return;
  }

  tb.innerHTML = data.map((d,i) => `
    <tr onclick="selectRow(${d.n})" class="${selIdx===d.n?'sel':''}">
      <td class="num">${i+1}</td>
      <td title="${d.country}">${d.country}</td>
      <td title="${d.org}">${d.org}</td>
      <td><span class="reg-pill reg-${regCode(d.reg)}">${regLabel(regCode(d.reg))}</span></td>
      <td class="num">${d.date}</td>
      <td title="${d.type}">${d.type}</td>
    </tr>`).join('');

  updateStats(data);
}

function updateStats(data){
  const elTotal = document.getElementById('s-total');
  const elCountries = document.getElementById('s-countries');
  if (elTotal) elTotal.textContent = data.length;
  if (elCountries) elCountries.textContent = new Set(data.map(d=>d.svgId)).size;
  const elEu = document.getElementById('s-eu');
  const elAs = document.getElementById('s-as');
  const elAm = document.getElementById('s-am');
  const elOt = document.getElementById('s-ot');
  if (elEu) elEu.textContent = data.filter(d=>regCode(d.reg)==='EU').length;
  if (elAs) elAs.textContent = data.filter(d=>regCode(d.reg)==='AS').length;
  if (elAm) elAm.textContent = data.filter(d=>regCode(d.reg)==='AM').length;
  if (elOt) elOt.textContent = data.filter(d=>regCode(d.reg)==='OT').length;
}

// When the region filter changes, select all countries that match that region
function handleRegChange(e){
  const val = (e && e.target && e.target.value) || document.getElementById('reg-filter').value;
  const code = regCode(val);
  if(!code){
    // clear selections when choosing "Бүх бүс нутаг"
    activeMapIds.clear();
    mapOverride = false;
    updatePills();
    render();
    return;
  }
  // collect unique svgIds for rows matching the region code
  const ids = new Set(RAW.filter(d=>regCode(d.reg)===code).map(d=> (d.svgId||'').toUpperCase()).filter(Boolean));
  // populate pills/highlights for the region but do not enable map override
  activeMapIds.clear();
  ids.forEach(id => activeMapIds.add(id));
  mapOverride = false;
  updatePills();
  render();
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function selectRow(n){
  if(selIdx===n){ closeDetail(); return; }
  selIdx = n;
  const d = RAW.find(r=>r.n===n);
  document.getElementById('d-name').textContent     = d.org;
  document.getElementById('d-country').textContent  = d.country;
  document.getElementById('d-date').textContent     = d.date;
  document.getElementById('d-type').textContent     = d.type;
  document.getElementById('d-reg').textContent      = regLabel(regCode(d.reg));
  document.getElementById('d-country2').textContent = d.country;
  document.getElementById('detail').className       = 'detail show';
  render();
}

function closeDetail(){
  selIdx = null;
  document.getElementById('detail').className = 'detail';
  render();
}

function sortBy(k){
  if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
  document.getElementById('si-date').textContent = sortDir===1?'↑':'↓';
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', render);
document.getElementById('reg-filter').addEventListener('change', handleRegChange);
document.getElementById('type-filter').addEventListener('change', () => { mapOverride = false; render(); });
document.getElementById('si-date').addEventListener('click', () => sortBy('date'));
// Initially activate all partner countries so the map behaves
// as if a region was selected on first load.
activeMapIds = new Set(partnerIds);
updatePills();
render();       // show table immediately
loadMap();      // load map in background (no .then needed)
</script>
</body>
</html>
